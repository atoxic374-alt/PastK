openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Kick Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: bot
  - name: messages
  - name: channels
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
          description: OK

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBotBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
          description: OK

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
          description: OK

  /bot/otp:
    post:
      operationId: submitOtp
      tags: [bot]
      summary: Submit OTP code for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
          description: OK

  /bot/account:
    get:
      operationId: getBotAccount
      tags: [bot]
      summary: Get logged-in account info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfoResponse"
          description: OK

  /bot/logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get bot activity logs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotLogsResponse"
          description: OK

  /channels/search:
    get:
      operationId: searchChannels
      tags: [channels]
      summary: Search Kick channels
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelSearchResponse"
          description: OK

  /channels/{slug}/status:
    get:
      operationId: getChannelStatus
      tags: [channels]
      summary: Get channel live status
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelInfo"
          description: OK

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get all messages
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"
          description: OK
    post:
      operationId: createMessage
      tags: [messages]
      summary: Create a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageBody"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
          description: Created

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageResponse"
          description: OK

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BotState:
      type: string
      enum:
        - idle
        - launching
        - logging_in
        - awaiting_otp
        - verifying
        - monitoring
        - live
        - stopped
        - error

    AccountInfo:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        avatar:
          type: string
          nullable: true
        followersCount:
          type: integer
        followingCount:
          type: integer
        verified:
          type: boolean
      required: [username, followersCount, followingCount, verified]

    BotStatus:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/BotState"
        channelName:
          type: string
        isLive:
          type: boolean
        messagesSent:
          type: integer
        intervalSeconds:
          type: integer
        startedAt:
          type: string
          nullable: true
        otpRequired:
          type: boolean
        account:
          $ref: "#/components/schemas/AccountInfo"
          nullable: true
        error:
          type: string
          nullable: true
        viewers:
          type: integer
          nullable: true
        streamTitle:
          type: string
          nullable: true
      required:
        - state
        - isLive
        - messagesSent
        - intervalSeconds
        - otpRequired

    StartBotBody:
      type: object
      properties:
        channelName:
          type: string
        email:
          type: string
        password:
          type: string
        intervalSeconds:
          type: integer
      required: [channelName, email, password, intervalSeconds]

    OtpBody:
      type: object
      properties:
        code:
          type: string
      required: [code]

    AccountInfoResponse:
      type: object
      properties:
        account:
          $ref: "#/components/schemas/AccountInfo"
          nullable: true
      required: [account]

    BotLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/BotLog"
      required: [logs]

    BotLog:
      type: object
      properties:
        id:
          type: integer
        event:
          type: string
        message:
          type: string
          nullable: true
        timestamp:
          type: string
      required: [id, event, timestamp]

    ChannelInfo:
      type: object
      properties:
        slug:
          type: string
        username:
          type: string
        avatar:
          type: string
          nullable: true
        isLive:
          type: boolean
        viewers:
          type: integer
          nullable: true
        streamTitle:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        followersCount:
          type: integer
          nullable: true
        thumbnail:
          type: string
          nullable: true
      required: [slug, username, isLive]

    ChannelSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ChannelInfo"
      required: [results]

    MessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [messages]

    Message:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        createdAt:
          type: string
      required: [id, text, createdAt]

    CreateMessageBody:
      type: object
      properties:
        text:
          type: string
      required: [text]

    DeleteMessageResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]
