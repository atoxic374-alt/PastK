kind = "web"
previewPath = "/"
title = "Kick Bot Control Panel"
version = "1.0.0"
id = "artifacts/kick-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26066

[services.development]
run = "pnpm --filter @workspace/kick-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kick-bot", "run", "build" ]
publicDir = "artifacts/kick-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26066"
BASE_PATH = "/"
